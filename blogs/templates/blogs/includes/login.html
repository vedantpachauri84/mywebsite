<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Registration Form</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff4b2b, #ff416c);
      background-size:400% 400%;
      animation:bgAnimation 10s ease infinite;
    }

    @keyframes bgAnimation{
      0%{
        background-position:0% 50%;
      }
      50%{
        background-position:100% 50%;
      }
      100%{
        background-position:0% 50%;
      }
    }

    .container{
      width:380px;
      padding:40px;
      border-radius:20px;
      background:rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      border:1px solid rgba(255,255,255,0.2);
      animation:slideUp 1s ease;
    }

    @keyframes slideUp{
      from{
        opacity:0;
        transform:translateY(50px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .container h2{
      text-align:center;
      color:white;
      margin-bottom:30px;
      font-size:32px;
      letter-spacing:1px;
    }

    .input-box{
      position:relative;
      margin-bottom:25px;
    }

    .input-box input{
      width:100%;
      padding:15px;
      border:none;
      outline:none;
      border-radius:10px;
      background:rgba(255,255,255,0.2);
      color:white;
      font-size:16px;
      transition:0.3s;
    }

    .input-box input::placeholder{
      color:#eee;
    }

    .input-box input:focus{
      background:rgba(255,255,255,0.3);
      transform:scale(1.03);
      box-shadow:0 0 10px rgba(255,255,255,0.5);
    }

    .btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:linear-gradient(to right, #ff416c, #ff4b2b);
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.4s;
      font-weight:bold;
      letter-spacing:1px;
    }

    .btn:hover{
      transform:translateY(-3px) scale(1.02);
      box-shadow:0 8px 20px rgba(255,75,43,0.5);
    }

    .btn:active{
      transform:scale(0.98);
    }

    .login-link{
      margin-top:20px;
      text-align:center;
      color:white;
    }

    .login-link a{
      color:#fff;
      text-decoration:none;
      font-weight:bold;
      transition:0.3s;
    }

    .login-link a:hover{
      color:yellow;
    }

    .circle{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.15);
      animation:float 6s infinite ease-in-out;
    }

    .circle:nth-child(1){
      width:120px;
      height:120px;
      top:10%;
      left:10%;
    }

    .circle:nth-child(2){
      width:180px;
      height:180px;
      bottom:10%;
      right:10%;
      animation-delay:2s;
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-20px);
      }
      100%{
        transform:translateY(0px);
      }
      .container{
     position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;
}
    }

  </style>
</head>

<body>
{% if messages %}
<div class="container">
{% for message in messages %}
<h2>{{message}}</h2>
{% endfor %}
</div>
{% endif %}
<form action="" method="POST">

    {% csrf_token %}

    <div class="input-box">
        <input type="text" name="username" placeholder="Username" required>
    </div>

    <div class="input-box">
        <input type="password" name="password1" placeholder="Password" required>
    </div>

    <button type="submit" class="btn">Login</button>

  </form>
</body>
</html>
