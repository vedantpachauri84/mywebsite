{% load static %}

<section>
    <h1>{{ blog.title }}</h1>

    <img src="{% static 'images/'|add:blog.title|add:'.jpg' %}" alt="{{blog.id }}" width="100px">
    <li><a href="{% url 'about' blog.title %}">{{blog.title}}</a></li>

    <br>Post on {{ blog.date }}
     <br>Author of that blog is {{blog.author}}




    <p>{{ blog.summary }}</p>
</section>
